name: Publish Crates

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WasserXR-Core
        uses: actions/checkout@v4
        with:
          path: WasserXR-Core

      - name: Checkout WasserXR
        uses: actions/checkout@v4
        with:
          repository: LarsZauberer/WasserXR
          path: WasserXR

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Build
        run: nix develop -c cargo build --locked
        working-directory: WasserXR-Core

      - name: Wait for root crate
        run: |
          version="$(nix develop -c cargo pkgid -p wasserxr)"
          version="${version##*#}"
          version="${version##*@}"
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error "https://crates.io/api/v1/crates/wasserxr/${version}" > /dev/null; then
              exit 0
            fi
            sleep 30
          done
          echo "wasserxr ${version} did not appear in the crates.io index"
          exit 1
        working-directory: WasserXR-Core

      - name: Publish core crate
        run: |
          version="$(nix develop -c cargo pkgid -p wasserxr-core)"
          version="${version##*#}"
          version="${version##*@}"
          if curl --fail --silent --show-error "https://crates.io/api/v1/crates/wasserxr-core/${version}" > /dev/null; then
            echo "wasserxr-core ${version} is already published"
          else
            nix develop -c cargo publish -p wasserxr-core --locked
          fi
        working-directory: WasserXR-Core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES }}
